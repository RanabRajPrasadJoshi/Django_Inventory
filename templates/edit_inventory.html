{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/stockadd.css' %}">

<div class="app-layout">
    <main class="main-content">
        <section class="content-area">

            <div class="form-card">
                <h2>Edit Inventory</h2>
                <p class="subtitle">Modify stock details</p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-grid">

                        <!-- Product -->
                        <div class="form-group">
                            <label>Product</label>
                            <select name="product">
                                {% for p in products %}
                                <option value="{{ p.id }}" {% if p.id == inventory.product.id %}selected{% endif %}>
                                    {{ p.product_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Store -->
                        <div class="form-group">
                            <label>Store</label>
                            <select name="store">
                                {% for s in stores %}
                                <option value="{{ s.id }}" {% if s.id == inventory.store.id %}selected{% endif %}>
                                    {{ s.store_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Quantity -->
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" name="quantity" value="{{ inventory.quantity }}" required>
                        </div>

                        <!-- Market Price -->
                        <div class="form-group">
                            <label>Market Price</label>
                            <input type="number" step="0.01" name="market_price" id="marketPrice"
value="{{ last_item.market_price|default:0 }}">
                        </div>

                        <!-- Total Market -->
                        <div class="form-group">
                            <label>Total Market</label>
                            <input type="number" step="0.01" id="totalMarket" readonly>
                        </div>

                        <!-- Cost Price -->
                        <div class="form-group">
                            <label>Cost Price</label>
                            <input type="number" step="0.01" name="cost_price" id="costPrice"
value="{{ last_item.cost_price|default:0 }}">
                        </div>

                        <!-- Total Cost -->
                        <div class="form-group">
                            <label>Total Cost</label>
                            <input type="number" step="0.01" id="totalCost" readonly>
                        </div>

                        <!-- Remark -->
                        <div class="form-group full-width">
                            <label>Remark</label>
                            <textarea name="remark" rows="3">Edited inventory</textarea>
                        </div>

                    </div>

                    <div class="form-actions">
                        <a href="{% url 'viewInventory' %}" class="btn-secondary">Cancel</a>
                        <button type="submit" class="btn-primary">Update</button>
                    </div>

                    <div class="form-group">
    <label>Received Date</label>
    <input type="date" name="received_date" required>
</div>

                </form>
            </div>

        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const quantityInput = document.querySelector('input[name="quantity"]');
    const marketPriceInput = document.getElementById("marketPrice");
    const totalMarketInput = document.getElementById("totalMarket");
    const costPriceInput = document.getElementById("costPrice");
    const totalCostInput = document.getElementById("totalCost");

    function calculateTotals() {
        const quantity = parseFloat(quantityInput.value) || 0;
        const marketPrice = parseFloat(marketPriceInput.value) || 0;
        const costPrice = parseFloat(costPriceInput.value) || 0;

        totalMarketInput.value = (quantity * marketPrice).toFixed(2);
        totalCostInput.value = (quantity * costPrice).toFixed(2);
    }

    // ✅ Events
    quantityInput.addEventListener("input", calculateTotals);
    marketPriceInput.addEventListener("input", calculateTotals);
    costPriceInput.addEventListener("input", calculateTotals);

    // ✅ IMPORTANT: run once on page load
    calculateTotals();
});
</script>

{% endblock %}
