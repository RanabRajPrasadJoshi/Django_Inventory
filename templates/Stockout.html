

{% extends "base.html" %}
{% load static %}
{% block content %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Out | Inventory</title>
    <link rel="stylesheet" href="{% static 'css/stockout.css' %}">
</head>
<body>

<div class="page-wrapper">
    <div class="form-card">
        <h2>Stock Out Form</h2>
        <p class="subtitle">Remove items from inventory</p>

        <form method="post">

            <div class="form-grid">
                

                <div class="form-group">
                    <label>Code</label>
                    <input type="text" name="code" placeholder="Enter product code">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="">Select category</option>
                        <option>Electronics</option>
                        <option>Grocery</option>
                        <option>Stationery</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="product_name" placeholder="Enter product name">
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" placeholder="Enter quantity">
                </div>

                <div class="form-group">
                    <label>Market Price</label>
                    <input type="number" name="market_price" placeholder="Market price">
                </div>

                <div class="form-group">
                    <label>Total (Market)</label>
                    <input type="number" name="total_market" readonly>
                </div>

                <div class="form-group">
                    <label>Cost Price</label>
                    <input type="number" name="cost_price" placeholder="Cost price">
                </div>

                <div class="form-group">
                    <label>Total (Cost)</label>
                    <input type="number" name="total_cost" readonly>
                </div>

                <div class="form-group">
                    <label>Received Date</label>
                    <input type="date" name="received_date">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="">Select status</option>
                        <option>Issued</option>
                        <option>Damaged</option>
                        <option>Returned</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Remark</label>
                    <textarea name="remark" rows="3" placeholder="Optional remark"></textarea>
                </div>

                <div class="form-group">
                    <label>Supplier</label>
                    <input type="text" name="supplier">
                </div>

                <div class="form-group">
                    <label>Imported For</label>
                    <input type="text" name="imported_for">
                </div>

                <div class="form-group">
                    <label>From</label>
                    <input type="text" name="from_location">
                </div>

                <div class="form-group">
                    <label>To</label>
                    <input type="text" name="to_location">
                </div>
            </div>

            <div class="form-actions">
                <button type="reset" class="btn-secondary">Clear</button>
                <button type="submit" class="btn-danger">Stock Out</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>

{% endblock %}
